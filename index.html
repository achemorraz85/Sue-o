<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Road Assistant</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        .ui { position: absolute; z-index: 10; width: 100%; text-align: center; padding-top: 10px; }
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .alert-zone { 
            position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%);
            width: 80%; height: 150px; border: 2px dashed rgba(255,255,255,0.3);
            pointer-events: none;
        }
        #dist-info { background: rgba(0,0,0,0.7); padding: 10px; border-radius: 10px; display: inline-block; }
        .danger { background: #dc2626 !important; animation: blink 0.4s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }
    </style>
</head>
<body>

<div class="ui">
    <div id="dist-info">
        <span id="status">Iniciando Radar AI...</span><br>
        <small id="detail">Alinea el celular hacia la carretera</small>
    </div>
</div>

<div class="alert-zone" id="lane-guide"></div>
<video id="video" autoplay playsinline muted style="display:none;"></video>
<canvas id="canvas"></canvas>

<audio id="warnSnd" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const status = document.getElementById('status');
const warnSnd = document.getElementById('warnSnd');

let model;
let lastAlert = 0;

async function setup() {
    status.innerText = "Cargando Modelos de Tráfico...";
    model = await cocoSsd.load();
    
    const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" }, // Cámara trasera
        audio: false 
    });
    video.srcObject = stream;
    
    video.onloadedmetadata = () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        detectFrame();
    };
}

async function detectFrame() {
    const predictions = await model.detect(video);
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(video, 0, 0);

    let dangerDetected = false;

    predictions.forEach(pred => {
        // Solo nos importan vehículos
        if (['car', 'truck', 'bus', 'motorcycle'].includes(pred.class)) {
            const [x, y, width, height] = pred.bbox;
            
            // Dibujar caja del vehículo
            ctx.strokeStyle = "#00ff00";
            ctx.lineWidth = 4;
            ctx.strokeRect(x, y, width, height);

            // "Cálculo" de distancia basado en el ancho ocupado en pantalla
            // Si el auto ocupa más del 40% del ancho, está muy cerca
            const sizeRatio = width / canvas.width;
            
            // Invasión de carril (si el objeto está muy a la izquierda o derecha)
            const centerX = x + (width / 2);
            const isLeftCutIn = centerX < (canvas.width * 0.3); // Zona izquierda

            if (sizeRatio > 0.45) {
                ctx.strokeStyle = "#ff0000";
                ctx.strokeRect(x, y, width, height);
                status.innerText = "⚠️ ¡DISTANCIA CRÍTICA!";
                dangerDetected = true;
            } else if (isLeftCutIn && sizeRatio > 0.2) {
                status.innerText = "🚗 VEHÍCULO INVADIENDO IZQ";
                ctx.strokeStyle = "#fbbf24";
                dangerDetected = true;
            }
        }
    });

    if (dangerDetected) {
        document.body.style.backgroundColor = "#450a0a";
        if (Date.now() - lastAlert > 1000) {
            warnSnd.play();
            lastAlert = Date.now();
        }
    } else {
        document.body.style.backgroundColor = "#000";
        status.innerText = "Radar de Tráfico OK";
    }

    requestAnimationFrame(detectFrame);
}

setup();
</script>
</body>
</html>
