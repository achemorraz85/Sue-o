<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Driver Alert AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; background: #020617; color: white; font-family: sans-serif; text-align: center; }
        .ui { padding: 15px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        video { width: 100%; max-width: 400px; border-radius: 20px; transform: scaleX(-1); background: #000; }
        .btns { display: flex; gap: 10px; width: 100%; max-width: 400px; }
        button { flex: 1; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .cal { background: #334155; color: white; }
        .ready { background: #10b981 !important; }
        #msg { width: 90%; padding: 20px; background: #1e293b; border-radius: 15px; }
        .warning { background: #dc2626 !important; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }
    </style>
</head>
<body>
<div class="ui">
    <h3>Driver Alert AI 🚗</h3>
    <video id="vid" playsinline></video>
    <div id="val" style="color: #3b82f6;">Esperando IA...</div>
    <div class="btns">
        <button class="cal" id="b1" onclick="save('open')">1. ABIERTOS</button>
        <button class="cal" id="b2" onclick="save('closed')">2. CERRADOS</button>
    </div>
    <div id="msg">Pulsa INICIAR</div>
    <button id="go" style="background:#3b82f6; color:white; width:100%; max-width:400px;" onclick="start()">INICIAR</button>
</div>

<audio id="alarm" loop src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>
const video = document.getElementById('vid');
const msg = document.getElementById('msg');
const valTxt = document.getElementById('val');
const alarm = document.getElementById('alarm');

let faceMesh;
let curVal = 0;
let cal = { open: 0, closed: 0 };
let limit = 0;
let time = 0;

function save(type) {
    if (curVal === 0) return alert("Espera a que el número cambie de 0.0000");
    cal[type] = curVal;
    document.getElementById(type === 'open' ? 'b1' : 'b2').classList.add('ready');
    if (cal.open && cal.closed) {
        limit = (cal.open + cal.closed) / 2;
        msg.innerText = "¡SISTEMA ACTIVO!";
    }
}

function onResults(results) {
    if (results.multiFaceLandmarks && results.multiFaceLandmarks[0]) {
        const face = results.multiFaceLandmarks[0];
        // Medimos distancia entre párpados
        curVal = Math.abs(face[159].y - face[145].y);
        valTxt.innerText = "Apertura: " + curVal.toFixed(4);

        if (limit > 0) {
            if (curVal < limit) {
                if (time === 0) time = Date.now();
                if (Date.now() - time > 1200) {
                    msg.innerText = "¡DESPIERTE!";
                    msg.classList.add('warning');
                    alarm.play().catch(()=>{});
                }
            } else {
                time = 0;
                msg.innerText = "Vigilando...";
                msg.classList.remove('warning');
                alarm.pause();
            }
        }
    }
}

async function start() {
    msg.innerText = "Cargando IA... espera 5 seg.";
    faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceMesh.setOptions({maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5});
    faceMesh.onResults(onResults);

    const camera = new Camera(video, {
        onFrame: async () => { await faceMesh.send({image: video}); },
        width: 640, height: 480
    });
    camera.start();
    document.getElementById('go').style.display = 'none';
}
</script>
</body>
</html>
