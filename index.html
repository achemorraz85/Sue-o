<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Driver Alert - Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; background: #020617; color: white; font-family: sans-serif; text-align: center; }
        .container { padding: 10px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        video { width: 100%; max-width: 400px; border-radius: 20px; transform: scaleX(-1); background: #000; }
        .btn-group { display: flex; gap: 10px; width: 100%; max-width: 400px; }
        button { flex: 1; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .cal-btn { background: #334155; color: white; }
        .done { background: #10b981 !important; }
        #status { width: 90%; padding: 20px; background: #1e293b; border-radius: 15px; margin: 10px; }
        .alerta { background: #dc2626 !important; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }
    </style>
</head>
<body>
<div class="container">
    <h3>Driver Alert AI 🚗</h3>
    <video id="video" playsinline></video>
    <div id="val">Apertura: Detectando...</div>
    <div class="btn-group">
        <button class="cal-btn" id="b1" onclick="calibrar('open')">1. ABIERTOS</button>
        <button class="cal-btn" id="b2" onclick="calibrar('closed')">2. CERRADOS</button>
    </div>
    <div id="status">Presiona INICIAR</div>
    <button id="start" style="background:#3b82f6; color:white; width:100%; max-width:400px;" onclick="init()">INICIAR CÁMARA</button>
</div>

<audio id="audio" loop src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>
const video = document.getElementById('video');
const status = document.getElementById('status');
const valText = document.getElementById('val');
const audio = document.getElementById('audio');

let faceMesh;
let aperturaActual = 0;
let datos = { open: 0, closed: 0 };
let umbral = 0;
let inicioCierre = 0;

function calibrar(tipo) {
    if (aperturaActual === 0) return alert("Aún no detecto tu cara");
    datos[tipo] = aperturaActual;
    document.getElementById(tipo === 'open' ? 'b1' : 'b2').classList.add('done');
    if (datos.open && datos.closed) {
        umbral = (datos.open + datos.closed) / 2; // Punto medio
        status.innerText = "¡LISTO! Vigilando...";
    }
}

function onResults(results) {
    if (results.multiFaceLandmarks && results.multiFaceLandmarks[0]) {
        const face = results.multiFaceLandmarks[0];
        // Calculamos la distancia entre el punto 159 (arriba) y 145 (abajo) del ojo
        aperturaActual = Math.abs(face[159].y - face[145].y);
        valText.innerText = "Apertura: " + aperturaActual.toFixed(4);

        if (umbral > 0) {
            if (aperturaActual < umbral) {
                if (inicioCierre === 0) inicioCierre = Date.now();
                if (Date.now() - inicioCierre > 1000) {
                    status.innerText = "¡DESPIERTA!";
                    status.classList.add('alerta');
                    audio.play().catch(()=>{});
                }
            } else {
                inicioCierre = 0;
                status.innerText = "Vigilando...";
                status.classList.remove('alerta');
                audio.pause();
            }
        }
    } else {
        valText.innerText = "Buscando rostro...";
    }
}

async function init() {
    faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceMesh.setOptions({maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5});
    faceMesh.onResults(onResults);

    const camera = new Camera(video, {
        onFrame: async () => { await faceMesh.send({image: video}); },
        width: 640, height: 480
    });
    camera.start();
    document.getElementById('start').style.display = 'none';
    status.innerText = "Calibra los pasos 1 y 2";
}
</script>
</body>
</html>
