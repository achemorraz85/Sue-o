<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CarWash GPS Manager</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap');

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a28;
      --border: #2a2a3f;
      --accent: #00e5ff;
      --accent2: #7c3aed;
      --green: #00e676;
      --red: #ff1744;
      --yellow: #ffea00;
      --text: #f0f0ff;
      --muted: #6b6b8a;
      --card: #16162a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* === LOGIN === */
    #loginScreen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; background: radial-gradient(ellipse at 50% 0%, #1a0a3a 0%, #0a0a0f 60%); }
    .logo-wrap { text-align: center; margin-bottom: 30px; }
    .logo-icon { width: 60px; height: 60px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 30px; margin: 0 auto 10px; box-shadow: 0 0 30px rgba(0,229,255,0.2); }
    .logo-title { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 2px; color: #fff; }
    .login-card { width: 100%; max-width: 350px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 25px; }
    .login-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
    .login-tab { padding: 10px; border-radius: 10px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-weight: 600; cursor: pointer; }
    .login-tab.active { background: var(--accent2); color: #fff; border-color: var(--accent2); }
    .form-group { margin-bottom: 15px; }
    .form-label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; }
    .form-input { width: 100%; padding: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); outline: none; }
    .btn-primary { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent), #00b8d4); border: none; border-radius: 12px; color: #000; font-weight: 700; cursor: pointer; margin-top: 10px; }

    /* === APP SHELL === */
    #appShell { display: none; flex-direction: column; min-height: 100vh; }
    .topbar { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 15px; background: rgba(10,10,15,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
    .user-badge { font-size: 10px; padding: 3px 8px; border-radius: 5px; font-weight: 700; }
    .user-badge.admin { background: var(--accent2); color: white; }
    .user-badge.employee { background: var(--accent); color: black; }
    .main-content { flex: 1; padding: 15px; padding-bottom: 80px; }
    .section { display: none; }
    .section.active { display: block; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 15px; margin-bottom: 15px; }
    .card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }

    /* === SERVICIOS === */
    .service-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .service-btn { background: var(--surface2); border: 2px solid var(--border); border-radius: 12px; padding: 15px 10px; cursor: pointer; text-align: center; }
    .service-btn.selected { border-color: var(--accent); background: rgba(0,229,255,0.1); }

    /* === NAV === */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; padding: 10px 0; }
    .nav-item { flex: 1; border: none; background: none; color: var(--muted); font-size: 10px; cursor: pointer; }
    .nav-item.active { color: var(--accent); }

    /* === ADMIN STYLES === */
    .user-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .btn-action { padding: 5px 8px; border-radius: 6px; font-size: 10px; cursor: pointer; background: none; margin-left: 4px; }
    .btn-edit { border: 1px solid var(--yellow); color: var(--yellow); }
    .btn-del { border: 1px solid var(--red); color: var(--red); }

    /* MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal-content { background: var(--surface); border-radius: 20px; padding: 20px; width: 100%; max-width: 400px; }
  </style>
</head>
<body>

<div id="loginScreen">
  <div class="logo-wrap">
    <div class="logo-icon">🧼</div>
    <div class="logo-title">CarWash Pro</div>
  </div>
  <div class="login-card">
    <div class="login-tabs">
      <button class="login-tab active" id="tab-emp" onclick="setRole('employee')">Operador</button>
      <button class="login-tab" id="tab-adm" onclick="setRole('admin')">Admin</button>
    </div>
    <div class="form-group">
      <label class="form-label">Usuario</label>
      <input type="text" class="form-input" id="loginUser" placeholder="Nombre">
    </div>
    <div class="form-group">
      <label class="form-label">PIN</label>
      <input type="password" class="form-input" id="loginPin" inputmode="numeric" placeholder="••••">
    </div>
    <button class="btn-primary" onclick="handleLogin()">ENTRAR</button>
    <p id="gpsInfo" style="font-size: 10px; color: var(--muted); text-align: center; margin-top: 10px;">Validación de ubicación requerida</p>
  </div>
</div>

<div id="appShell">
  <div class="topbar">
    <div style="font-family:'Bebas Neue'; font-size: 20px; color: var(--accent);">CW MANAGER</div>
    <div>
      <span id="roleBadge" class="user-badge"></span>
      <button onclick="location.reload()" style="background:none; border:none; color:var(--red); margin-left:10px;">Salir</button>
    </div>
  </div>

  <div class="main-content">
    <div class="section active" id="sec-cobrar">
      <div class="card">
        <div class="card-title">Datos del Vehículo</div>
        <input type="text" class="form-input" id="placaInput" placeholder="Nº DE PLACA" style="text-align:center; font-size: 24px; font-weight: 700; margin-bottom: 15px;">
        <div class="card-title">Seleccionar Servicio</div>
        <div class="service-grid" id="serviceGrid"></div>
      </div>
      <button class="btn-primary" style="background: var(--green);" onclick="processSale()">FINALIZAR VENTA</button>
    </div>

    <div class="section" id="sec-config">
      <div class="card">
        <div class="card-title">Personal / Operadores</div>
        <div id="userList"></div>
        <button class="btn-primary" onclick="openAddUserModal()" style="font-size:12px; height: 40px;">+ AGREGAR OPERADOR</button>
      </div>

      <div class="card">
        <div class="card-title">Mi Seguridad (Administrador)</div>
        <button class="btn-primary" onclick="openChangeMyPinModal()" style="background: var(--surface2); border: 1px solid var(--border); color: var(--yellow);">CAMBIAR MI PIN DE ACCESO</button>
      </div>

      <div class="card">
        <div class="card-title">Ubicación del Negocio</div>
        <div id="gpsCoordsUI" style="background:var(--bg); padding:10px; border-radius:8px; font-family:monospace; margin-bottom:10px; font-size: 12px; text-align:center;">Lat: -- | Lng: --</div>
        <button class="btn-primary" id="btnFixLocation" onclick="fixOfficeLocation()" style="background:var(--accent2);">📍 FIJAR UBICACIÓN AQUÍ</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item active" onclick="changeNav('cobrar', this)"><span>💳</span><br>Cobrar</button>
    <button class="nav-item" id="nav-adm-btn" style="display:none" onclick="changeNav('config', this)"><span>⚙️</span><br>Config</button>
  </nav>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal-content">
    <h3 id="modalTitle" style="margin-bottom:15px; color: var(--accent);"></h3>
    <div id="modalBody"></div>
  </div>
</div>

<script>
let currentRole = 'employee';
let currentUser = null;
const SERVICES = [
  { id: 1, name: 'Lavado Básico', price: 10 },
  { id: 2, name: 'Lavado Premium', price: 20 },
  { id: 3, name: 'Detallado', price: 45 },
  { id: 4, name: 'Motor', price: 15 }
];
let selectedService = null;

const getDBUsers = () => JSON.parse(localStorage.getItem('cw_users')) || [{ id: 1, name: 'Admin', pin: '0000', role: 'admin' }];
const saveDBUsers = (users) => localStorage.setItem('cw_users', JSON.stringify(users));
const getOfficeLoc = () => JSON.parse(localStorage.getItem('cw_office_loc')) || null;

function calculateDistance(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLon = (lon2-lon1) * Math.PI/180;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

function setRole(role) {
  currentRole = role;
  document.getElementById('tab-emp').classList.toggle('active', role === 'employee');
  document.getElementById('tab-adm').classList.toggle('active', role === 'admin');
}

function handleLogin() {
  const name = document.getElementById('loginUser').value.trim();
  const pin = document.getElementById('loginPin').value.trim();
  const user = getDBUsers().find(u => u.name.toLowerCase() === name.toLowerCase() && u.pin === pin && u.role === currentRole);
  
  if (!user) return alert("Credenciales incorrectas");

  if (user.role === 'employee') {
    const office = getOfficeLoc();
    if (!office) return alert("El Admin no ha configurado el GPS.");
    navigator.geolocation.getCurrentPosition((pos) => {
      if (calculateDistance(pos.coords.latitude, pos.coords.longitude, office.lat, office.lng) > 0.2) alert("Fuera de rango");
      else loginSuccess(user);
    }, () => alert("Activa el GPS"));
  } else loginSuccess(user);
}

function loginSuccess(user) {
  currentUser = user;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appShell').style.display = 'flex';
  const badge = document.getElementById('roleBadge');
  badge.textContent = user.role.toUpperCase();
  badge.className = 'user-badge ' + user.role;
  if (user.role === 'admin') {
    document.getElementById('nav-adm-btn').style.display = 'block';
    renderUserList();
    renderOfficeCoords();
  }
  renderServices();
}

function renderUserList() {
  const users = getDBUsers();
  document.getElementById('userList').innerHTML = users.map(u => `
    <div class="user-row">
      <div style="font-size:13px">${u.name} <span style="color:var(--muted); font-size:10px">PIN: ${u.pin}</span></div>
      <div>
        <button class="btn-action btn-edit" onclick="openEditPinModal(${u.id})">PIN</button>
        ${u.id !== 1 ? `<button class="btn-action btn-del" onclick="deleteUser(${u.id})">X</button>` : ''}
      </div>
    </div>
  `).join('');
}

// MODAL PARA EDITAR PIN DE OPERADORES
function openEditPinModal(id) {
  const user = getDBUsers().find(u => u.id === id);
  document.getElementById('modalTitle').textContent = `Editar PIN: ${user.name}`;
  document.getElementById('modalBody').innerHTML = `
    <input type="password" id="editPinInput" class="form-input" placeholder="Nuevo PIN (4 dígitos)" maxlength="4" inputmode="numeric">
    <button class="btn-primary" onclick="saveNewPin(${id})">ACTUALIZAR</button>
    <button class="btn-primary" onclick="closeModal()" style="background:none; color:var(--muted)">Cancelar</button>
  `;
  document.getElementById('modal').classList.add('open');
}

function saveNewPin(id) {
  const newPin = document.getElementById('editPinInput').value;
  if (newPin.length !== 4) return alert("El PIN debe ser de 4 dígitos");
  const users = getDBUsers();
  const idx = users.findIndex(u => u.id === id);
  users[idx].pin = newPin;
  saveDBUsers(users);
  renderUserList();
  closeModal();
  alert("PIN actualizado");
}

// MODAL PARA CAMBIAR MI PROPIO PIN (ADMIN)
function openChangeMyPinModal() {
  document.getElementById('modalTitle').textContent = "Cambiar mi PIN";
  document.getElementById('modalBody').innerHTML = `
    <input type="password" id="myOldPin" class="form-input" placeholder="PIN Actual" maxlength="4" style="margin-bottom:10px">
    <input type="password" id="myNewPin" class="form-input" placeholder="Nuevo PIN (4 dígitos)" maxlength="4">
    <button class="btn-primary" onclick="confirmMyPinChange()">CONFIRMAR CAMBIO</button>
  `;
  document.getElementById('modal').classList.add('open');
}

function confirmMyPinChange() {
  const oldPin = document.getElementById('myOldPin').value;
  const newPin = document.getElementById('myNewPin').value;
  const users = getDBUsers();
  const admin = users.find(u => u.id === 1);

  if (admin.pin !== oldPin) return alert("El PIN actual es incorrecto");
  if (newPin.length !== 4) return alert("El nuevo PIN debe ser de 4 dígitos");

  admin.pin = newPin;
  saveDBUsers(users);
  closeModal();
  alert("Tu PIN ha sido cambiado con éxito. No lo olvides.");
  renderUserList();
}

function renderServices() {
  document.getElementById('serviceGrid').innerHTML = SERVICES.map(s => `
    <div class="service-btn" id="srv-${s.id}" onclick="selectService(${s.id})">
      <span style="display:block; font-weight:600">${s.name}</span>
      <span style="color:var(--accent); font-size:12px">$${s.price}</span>
    </div>
  `).join('');
}

function selectService(id) {
  selectedService = SERVICES.find(s => s.id === id);
  document.querySelectorAll('.service-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById(`srv-${id}`).classList.add('selected');
}

function processSale() {
  const p = document.getElementById('placaInput').value;
  if (!p || !selectedService) return alert("Falta placa o servicio");
  alert("VENTA GUARDADA");
  document.getElementById('placaInput').value = '';
}

function deleteUser(id) { if (confirm("¿Eliminar?")) { saveDBUsers(getDBUsers().filter(u => u.id !== id)); renderUserList(); } }

function openAddUserModal() {
  document.getElementById('modalTitle').textContent = "Nuevo Operador";
  document.getElementById('modalBody').innerHTML = `
    <input type="text" id="nName" class="form-input" placeholder="Nombre" style="margin-bottom:10px">
    <input type="password" id="nPin" class="form-input" placeholder="PIN" maxlength="4" style="margin-bottom:10px">
    <button class="btn-primary" onclick="saveNewUser()">GUARDAR</button>
  `;
  document.getElementById('modal').classList.add('open');
}

function saveNewUser() {
  const n = document.getElementById('nName').value;
  const p = document.getElementById('nPin').value;
  if (n && p.length === 4) {
    const users = getDBUsers();
    users.push({ id: Date.now(), name: n, pin: p, role: 'employee' });
    saveDBUsers(users);
    renderUserList();
    closeModal();
  }
}

function fixOfficeLocation() {
  navigator.geolocation.getCurrentPosition((pos) => {
    localStorage.setItem('cw_office_loc', JSON.stringify({ lat: pos.coords.latitude, lng: pos.coords.longitude }));
    renderOfficeCoords();
    alert("Ubicación fijada");
  }, () => alert("Error GPS"), { enableHighAccuracy: true });
}

function renderOfficeCoords() {
  const loc = getOfficeLoc();
  if (loc) document.getElementById('gpsCoordsUI').textContent = `Lat: ${loc.lat.toFixed(5)} | Lng: ${loc.lng.toFixed(5)}`;
}

function changeNav(sec, btn) {
  document.querySelectorAll('.section, .nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('sec-' + sec).classList.add('active');
  btn.classList.add('active');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }
</script>
</body>
</html>
