<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Driver Alert AI v2 - Calibrado</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

    <style>
        :root {
            --bg: #020617;
            --card: #1e293b;
            --accent: #3b82f6;
            --danger: #dc2626;
            --success: #10b981;
        }

        body {
            margin: 0; padding: 0;
            font-family: sans-serif;
            background-color: var(--bg);
            color: white;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }

        .main-container {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 15px; gap: 10px;
        }

        .video-wrapper {
            width: 100%; max-width: 400px;
            border-radius: 20px; overflow: hidden;
            border: 3px solid #334155;
            position: relative;
        }

        video { width: 100%; display: block; transform: scaleX(-1); background: #000; }

        #status-indicator {
            width: 90%; max-width: 400px;
            padding: 20px; border-radius: 15px;
            text-align: center; font-size: 1.3rem; font-weight: bold;
            background: var(--card); transition: 0.2s;
        }

        .alerta-critica { background-color: var(--danger) !important; animation: pulse 0.4s infinite; }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.03);} 100% {transform: scale(1);} }

        #debug-info { color: #94a3b8; font-family: monospace; font-size: 0.8rem; }

        button {
            border: none; padding: 18px; font-size: 1.1rem;
            border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; max-width: 400px;
        }

        #startBtn { background: var(--accent); color: white; }
        #mapsBtn { background: var(--success); color: white; display: none; margin-top: 10px; }
    </style>
</head>
<body>

<div class="main-container">
    <h2 style="margin: 5px 0;">Driver Alert AI 🚗</h2>
    
    <div class="video-wrapper">
        <video id="input_video" playsinline></video>
    </div>

    <div id="debug-info">Apertura detectada: ---</div>
    <div id="status-indicator">Sistema Apagado</div>

    <button id="startBtn">INICIAR VIGILANCIA</button>
    <button id="mapsBtn" onclick="window.open('https://www.google.com/maps/search/gasolineras+cerca')">
        📍 BUSCAR DESCANSO
    </button>
</div>

<audio id="alarmAudio" loop>
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
</audio>

<script>
const videoElement = document.getElementById('input_video');
const statusBox = document.getElementById('status-indicator');
const debugBox = document.getElementById('debug-info');
const alarm = document.getElementById('alarmAudio');
const startBtn = document.getElementById('startBtn');
const mapsBtn = document.getElementById('mapsBtn');

let cerradoDesde = 0;

// --- AJUSTES DE SENSIBILIDAD ---
const UMBRAL_OJOS = 0.035;   // <--- SUBIDO PARA DETECTAR MEJOR TU CIERRE
const TIEMPO_ALERTA = 1000;  // 1 segundo de ojos cerrados activa la alarma

function onResults(results) {
    if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
        statusBox.innerText = "Buscando rostro...";
        return;
    }

    const landmarks = results.multiFaceLandmarks[0];
    
    // Calculamos apertura del ojo (distancia vertical)
    const apertura = landmarks[145].y - landmarks[159].y;
    
    // Mostramos el valor en pantalla para que calibres
    debugBox.innerText = `Valor Apertura: ${apertura.toFixed(4)}`;

    if (apertura < UMBRAL_OJOS) {
        if (cerradoDesde === 0) cerradoDesde = Date.now();
        
        let duracion = Date.now() - cerradoDesde;

        if (duracion > TIEMPO_ALERTA) {
            statusBox.innerText = "¡ALERTA: DESPIERTE!";
            statusBox.classList.add('alerta-critica');
            mapsBtn.style.display = 'block';
            if (alarm.paused) alarm.play().catch(e => {});
        }
    } else {
        cerradoDesde = 0;
        statusBox.innerText = "Estado: Despierto";
        statusBox.classList.remove('alerta-critica');
        alarm.pause();
        alarm.currentTime = 0;
    }
}

const faceMesh = new FaceMesh({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
});

faceMesh.setOptions({
    maxNumFaces: 1,
    refineLandmarks: true,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
});
faceMesh.onResults(onResults);

startBtn.onclick = async () => {
    // Activar sonido en Safari/Chrome móvil
    alarm.play().then(() => { alarm.pause(); });
    
    const camera = new Camera(videoElement, {
        onFrame: async () => { await faceMesh.send({image: videoElement}); },
        width: 640, height: 480
    });
    camera.start();
    startBtn.style.display = 'none';
};
</script>
</body>
</html>
