<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Driver Alert AI - Asistente de Viaje</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

    <style>
        :root {
            --bg: #020617;
            --card: #1e293b;
            --accent: #3b82f6;
            --danger: #dc2626;
            --success: #10b981;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            padding: 15px;
            text-align: center;
            background: var(--card);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            gap: 15px;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 450px;
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid #334155;
        }

        video {
            width: 100%;
            display: block;
            transform: scaleX(-1);
            background: #000;
        }

        #status-indicator {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            font-size: 1.4rem;
            font-weight: bold;
            background: var(--card);
            transition: all 0.2s ease;
        }

        .alerta-critica {
            background-color: var(--danger) !important;
            color: white;
            animation: pulse 0.4s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .controls {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-bottom: 20px;
        }

        button {
            border: none;
            padding: 18px;
            font-size: 1.1rem;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        #startBtn { background: var(--accent); color: white; }
        #mapsBtn { background: var(--success); color: white; display: none; }

        .disclaimer {
            font-size: 0.7rem;
            color: #64748b;
            text-align: center;
            padding: 0 20px;
        }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0">Driver Alert AI 🚗💤</h2>
</div>

<div class="main-container">
    <div class="video-wrapper">
        <video id="input_video" playsinline></video>
    </div>

    <div id="status-indicator">Sistema en espera...</div>

    <div class="controls">
        <button id="startBtn">INICIAR ASISTENTE DE VIAJE</button>
        <button id="mapsBtn" onclick="window.open('https://www.google.com/maps/search/gasolineras+y+descanso/')">
            📍 BUSCAR LUGAR DE DESCANSO
        </button>
    </div>

    <p class="disclaimer">
        ADVERTENCIA: Esta app es un asistente experimental. Si sientes sueño, detente inmediatamente. El desarrollador no se hace responsable de accidentes.
    </p>
</div>

<audio id="alarmAudio" loop>
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
</audio>

<script>
const videoElement = document.getElementById('input_video');
const statusBox = document.getElementById('status-indicator');
const alarm = document.getElementById('alarmAudio');
const startBtn = document.getElementById('startBtn');
const mapsBtn = document.getElementById('mapsBtn');

let wakeLock = null;
let cerradoDesde = 0; // Marca de tiempo cuando se detecta cierre

// --- CONFIGURACIÓN DE SENSIBILIDAD ---
const UMBRAL_OJOS = 0.022; // Distancia entre párpados (ajusta según necesites)
const TIEMPO_MICROSUEÑO = 1200; // Milisegundos antes de disparar alarma (1.2 segundos)

async function requestWakeLock() {
    try {
        if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
    } catch (err) { console.log("WakeLock error:", err); }
}

function onResults(results) {
    if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
        statusBox.innerText = "⚠️ Rostro no detectado";
        statusBox.style.color = "#fbbf24";
        return;
    }

    const landmarks = results.multiFaceLandmarks[0];
    
    // Medimos apertura del ojo izquierdo (puntos 159 y 145)
    const apertura = landmarks[145].y - landmarks[159].y;

    if (apertura < UMBRAL_OJOS) {
        // Los ojos parecen cerrados
        if (cerradoDesde === 0) cerradoDesde = Date.now();
        
        let duracion = Date.now() - cerradoDesde;

        if (duracion > TIEMPO_MICROSUEÑO) {
            statusBox.innerText = "¡ALERTA: DESPIERTE!";
            statusBox.classList.add('alerta-critica');
            mapsBtn.style.display = 'block';
            if (alarm.paused) alarm.play();
        } else {
            statusBox.innerText = "Detectando fatiga...";
        }
    } else {
        // Ojos abiertos
        cerradoDesde = 0;
        statusBox.innerText = "Estado: Conductor Despierto";
        statusBox.classList.remove('alerta-critica');
        statusBox.style.color = "#10b981";
        alarm.pause();
        alarm.currentTime = 0;
    }
}

const faceMesh = new FaceMesh({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
});

faceMesh.setOptions({
    maxNumFaces: 1,
    refineLandmarks: true,
    minDetectionConfidence: 0.6,
    minTrackingConfidence: 0.6
});

faceMesh.onResults(onResults);

startBtn.onclick = async () => {
    await requestWakeLock();
    
    const camera = new Camera(videoElement, {
        onFrame: async () => {
            await faceMesh.send({image: videoElement});
        },
        width: 640,
        height: 480
    });
    
    camera.start().then(() => {
        startBtn.style.display = 'none';
        statusBox.innerText = "Vigilancia Activa";
    }).catch(err => {
        alert("Error al acceder a la cámara. Asegúrate de usar HTTPS.");
    });
};
</script>

</body>
</html>
