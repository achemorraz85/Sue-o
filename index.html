<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Driver Alert AI - Estable</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; background: #020617; color: white; font-family: sans-serif; text-align: center; }
        .ui { padding: 10px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        video { width: 100%; max-width: 400px; border-radius: 20px; transform: scaleX(-1); background: #000; border: 2px solid #3b82f6; }
        .btns { display: flex; gap: 10px; width: 100%; max-width: 400px; }
        button { flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
        .cal { background: #1e293b; color: white; border: 1px solid #334155; }
        .done { background: #10b981 !important; }
        #msg { width: 90%; padding: 20px; background: #1e293b; border-radius: 15px; font-weight: bold; }
        .danger { background: #dc2626 !important; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.02);} 100% {transform: scale(1);} }
    </style>
</head>
<body>
<div class="ui">
    <h3>Driver Alert AI 🚗</h3>
    <video id="vid" playsinline></video>
    <div id="val" style="color: #60a5fa; font-family: monospace; font-size: 1.2rem;">Apertura: ---</div>
    <div class="btns">
        <button class="cal" id="b1" onclick="capture('open')">1. ABIERTOS</button>
        <button class="cal" id="b2" onclick="capture('closed')">2. CERRADOS</button>
    </div>
    <div id="msg">Presiona INICIAR</div>
    <button id="go" style="background:#3b82f6; color:white; width:100%; max-width:400px; padding:15px; border-radius:12px; font-weight:bold;" onclick="start()">INICIAR MONITOR</button>
</div>
<audio id="alarm" loop src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>
const video = document.getElementById('vid');
const msg = document.getElementById('msg');
const valTxt = document.getElementById('val');
const alarm = document.getElementById('alarm');

let curVal = 0;
let cal = { open: 0, closed: 0 };
let limit = 0;
let tStart = 0;
let processing = false; // Control para que no se congele

function capture(t) {
    if (curVal <= 0) return alert("Espera a que los números se muevan.");
    cal[t] = curVal;
    document.getElementById(t === 'open' ? 'b1' : 'b2').classList.add('done');
    if (cal.open && cal.closed) {
        limit = (cal.open + cal.closed) / 2;
        msg.innerText = "Vigilancia Activa ✅";
    }
}

async function onResults(res) {
    if (res.multiFaceLandmarks && res.multiFaceLandmarks[0]) {
        const f = res.multiFaceLandmarks[0];
        // Calculamos usando puntos estables del ojo
        const p1 = f[159].y;
        const p2 = f[145].y;
        curVal = Math.abs(p2 - p1);

        // Actualizamos texto solo si el valor es real
        valTxt.innerText = "Apertura: " + curVal.toFixed(5);

        if (limit > 0) {
            if (curVal < limit) {
                if (tStart === 0) tStart = Date.now();
                if (Date.now() - tStart > 1200) {
                    msg.innerText = "¡ALERTA! DESPIERTE";
                    msg.classList.add('danger');
                    alarm.play().catch(()=>{});
                }
            } else {
                tStart = 0;
                msg.innerText = "Vigilando...";
                msg.classList.remove('danger');
                alarm.pause();
            }
        }
    }
    processing = false; // Liberamos para la siguiente imagen
}

async function start() {
    const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceMesh.setOptions({maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5});
    faceMesh.onResults(onResults);

    const camera = new Camera(video, {
        onFrame: async () => {
            if (!processing) { // Solo procesa si la IA está libre
                processing = true;
                await faceMesh.send({image: video});
            }
        },
        width: 640, height: 480
    });
    camera.start();
    document.getElementById('go').style.display = 'none';
    msg.innerText = "Calibra Pasos 1 y 2";
}
</script>
</body>
</html>
