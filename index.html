<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DIVISOR DE hMORRAZ</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#111111">

<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="manifest" href="site.webmanifest">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --yellow: #FFD600;
    --black: #111111;
    --steel: #2a2a2a;
    --red: #E02020;
    --white: #F5F0E8;
  }

  * { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
    -webkit-tap-highlight-color: transparent; 
  }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* Ajuste para el notch de celulares modernos */
    padding: env(safe-area-inset-top) 16px 20px 16px;
  }

  header { text-align: center; margin-bottom: 20px; margin-top: 10px; }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 10vw, 3.5rem);
    color: var(--yellow);
    letter-spacing: 2px;
    line-height: 1;
  }

  .tape-wrap {
    width: 100%;
    max-width: 480px;
    margin-bottom: 20px;
  }

  canvas#tape {
    width: 100%;
    height: auto;
    border-radius: 6px;
    display: block;
    box-shadow: 0 6px 20px rgba(0,0,0,0.5);
  }

  .card {
    background: var(--steel);
    border: 1px solid #3a3a3a;
    border-radius: 12px;
    padding: 16px;
    width: 100%;
    max-width: 480px;
    margin-bottom: 15px;
  }

  .card-title {
    font-size: 0.65rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--yellow);
    margin-bottom: 12px;
  }

  .input-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
  }

  label {
    font-size: 0.6rem;
    text-transform: uppercase;
    color: #888;
  }

  input, select {
    background: #1a1a1a;
    border: 1px solid #444;
    border-radius: 6px;
    color: var(--white);
    font-family: 'DM Mono', monospace;
    font-size: 1.1rem;
    padding: 12px 8px;
    width: 100%;
    outline: none;
    text-align: center;
    /* Elimina sombras internas en iOS */
    -webkit-appearance: none;
  }

  input:focus { border-color: var(--yellow); }

  .divisor-input {
    background: #1a1a1a;
    border: 2px solid var(--red);
    color: white;
    font-size: 1.5rem;
    font-weight: bold;
  }

  .sep { font-size: 1.2rem; color: #555; margin-top: 15px; }

  .result-card {
    background: #111;
    border: 2px solid var(--yellow);
    border-radius: 12px;
    padding: 30px 20px;
    width: 100%;
    max-width: 480px;
    text-align: center;
  }

  .result-main {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(4rem, 20vw, 6rem);
    color: white;
    line-height: 1;
  }

  .frac-color {
    color: var(--yellow);
    margin-left: 10px;
  }
</style>
</head>
<body>

<header>
  <h1>DIVISOR DE hMORRAZ</h1>
</header>

<div class="tape-wrap">
  <canvas id="tape" width="900" height="140"></canvas>
</div>

<form id="calcForm" autocomplete="off">
  <div class="card">
    <p class="card-title">Medida a dividir (Pulgadas)</p>
    <div class="input-row">
      <div class="input-group" style="flex: 2;">
        <label>Pulgadas</label>
        <input type="number" id="inches" placeholder="0" inputmode="numeric">
      </div>
      <div class="sep">+</div>
      <div class="input-group">
        <label>Num.</label>
        <input type="number" id="num" placeholder="0" inputmode="numeric">
      </div>
      <div class="sep">/</div>
      <div class="input-group">
        <label>Den.</label>
        <select id="den">
          <option value="2">2</option>
          <option value="4" selected>4</option>
          <option value="8">8</option>
          <option value="16">16</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card">
    <p class="card-title">Dividir entre</p>
    <div class="input-group">
      <input type="number" id="divisor" placeholder="1" class="divisor-input" inputmode="numeric">
    </div>
  </div>
</form>

<div class="result-card">
  <p class="card-title" style="margin-bottom: 15px;">Medida Final (1/16")</p>
  <div class="result-main" id="resultMain">0"</div>
</div>

<script>
const precision = 16;

function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

function formatInches(totalInches, prec) {
  if (totalInches === 0) return '0"';
  const wholeIn = Math.floor(totalInches);
  let frac = totalInches - wholeIn;
  const roundedFrac = Math.round(frac * prec);
  
  let finalIn = wholeIn;
  let fn = roundedFrac;
  if (fn >= prec) { finalIn++; fn = 0; }
  
  if (fn === 0) return `${finalIn}"`;
  
  const common = gcd(fn, prec);
  const n = fn / common;
  const d = prec / common;
  
  const fracHtml = `<span class="frac-color">${n}/${d}"</span>`;
  return finalIn > 0 ? `${finalIn}${fracHtml}` : fracHtml;
}

function calculate() {
  const inVal = document.getElementById('inches').value;
  const divVal = document.getElementById('divisor').value;

  if (!inVal || inVal === "0") {
    document.getElementById('resultMain').innerHTML = '0"';
    drawTape(0, 0);
    return;
  }

  const inches  = parseFloat(inVal) || 0;
  const num     = parseInt(document.getElementById('num').value) || 0;
  const den     = parseInt(document.getElementById('den').value) || 1;
  const divisor = parseFloat(divVal) || 1;

  const totalIn = inches + (num / den);
  const result  = totalIn / divisor;
  const rounded = Math.round(result * precision) / precision;

  document.getElementById('resultMain').innerHTML = formatInches(rounded, precision);
  drawTape(totalIn, rounded);
}

function drawTape(orig, res) {
  const canvas = document.getElementById('tape');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  
  ctx.fillStyle = '#FFD600';
  ctx.fillRect(0,0,W,H);
  
  const start = Math.max(0, res - 3);
  const scale = W / 6;

  ctx.fillStyle = '#111';
  for(let i = Math.floor(start); i <= start + 7; i += 1/16) {
    let h = 10;
    if(Number.isInteger(i)) h = 60;
    else if(Number.isInteger(i*2)) h = 40;
    else if(Number.isInteger(i*4)) h = 25;
    
    const x = (i - start) * scale;
    if(x >= 0 && x <= W) {
      ctx.fillRect(x, (H-h)/2, 1.5, h);
      if(Number.isInteger(i)) {
        ctx.font = "bold 22px 'Bebas Neue'";
        ctx.fillText(i, x + 4, H/2 + 20);
      }
    }
  }
  
  const rx = (res - start) * scale;
  ctx.fillStyle = '#E02020';
  ctx.fillRect(rx-2, 0, 4, H);
}

window.onload = () => {
  document.getElementById('calcForm').reset();
  calculate();
};

['inches','num','den','divisor'].forEach(id => {
  document.getElementById(id).addEventListener('input', calculate);
});

calculate();
</script>
</body>
</html>
