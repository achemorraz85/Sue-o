<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Driver Alert FIX</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #020617; color: white; font-family: sans-serif; text-align: center; }
        .wrapper { padding: 15px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        video { width: 100%; max-width: 400px; border-radius: 20px; background: #000; transform: scaleX(-1); border: 2px solid #334155; }
        #status-box { width: 90%; padding: 20px; background: #1e293b; border-radius: 15px; font-weight: bold; }
        .btn-cal { flex: 1; padding: 15px; border-radius: 10px; border: none; background: #334155; color: white; font-weight: bold; }
        .active-btn { background: #10b981 !important; }
        .danger { background: #dc2626 !important; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.02);} 100% {transform: scale(1);} }
    </style>
</head>
<body>
<div class="wrapper">
    <h3>Driver Alert AI 🚗</h3>
    <video id="vid" playsinline></video>
    <div id="val-text" style="color: #3b82f6; font-family: monospace;">Detectando...</div>
    
    <div style="display: flex; gap: 10px; width: 100%; max-width: 400px;">
        <button class="btn-cal" id="b-open" onclick="capturar('open')">1. ABIERTOS</button>
        <button class="btn-cal" id="b-closed" onclick="capturar('closed')">2. CERRADOS</button>
    </div>

    <div id="status-box">Presiona INICIAR</div>
    <button id="start-btn" style="width:100%; max-width:400px; padding:15px; background:#3b82f6; color:white; border:none; border-radius:12px; font-weight:bold;" onclick="setup()">INICIAR CÁMARA</button>
</div>

<audio id="snd" loop src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>
const vid = document.getElementById('vid');
const stat = document.getElementById('status-box');
const vText = document.getElementById('val-text');
const snd = document.getElementById('snd');

let faceMesh;
let rawAperture = 0;
let calData = { open: 0, closed: 0 };
let limit = 0;
let timeClosed = 0;

function capturar(t) {
    if (rawAperture === 0 || isNaN(rawAperture)) return alert("Espera a ver el número de apertura");
    calData[t] = rawAperture;
    document.getElementById(t === 'open' ? 'b-open' : 'b-closed').classList.add('active-btn');
    if (calData.open && calData.closed) {
        limit = (calData.open + calData.closed) / 2;
        stat.innerText = "SISTEMA ACTIVO ✅";
    }
}

function process(res) {
    if (res.multiFaceLandmarks && res.multiFaceLandmarks[0]) {
        const f = res.multiFaceLandmarks[0];
        // SEGURIDAD: Si los puntos no existen, ponemos 0 para evitar NaN
        const p1 = f[159] ? f[159].y : 0;
        const p2 = f[145] ? f[145].y : 0;
        
        rawAperture = Math.abs(p2 - p1);
        
        if (isNaN(rawAperture)) rawAperture = 0; // Doble seguro contra NaN

        vText.innerText = "Apertura: " + rawAperture.toFixed(4);

        if (limit > 0) {
            if (rawAperture < limit) {
                if (timeClosed === 0) timeClosed = Date.now();
                if (Date.now() - timeClosed > 1000) {
                    stat.innerText = "¡ALERTA! DESPIERTE";
                    stat.classList.add('danger');
                    snd.play().catch(()=>{});
                }
            } else {
                timeClosed = 0;
                stat.innerText = "SISTEMA ACTIVO ✅";
                stat.classList.remove('danger');
                snd.pause();
            }
        }
    } else {
        vText.innerText = "Buscando rostro...";
    }
}

async function setup() {
    stat.innerText = "Cargando IA...";
    faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceMesh.setOptions({maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.6});
    faceMesh.onResults(process);

    const cam = new Camera(vid, {
        onFrame: async () => { await faceMesh.send({image: vid}); },
        width: 640, height: 480
    });
    
    cam.start().then(() => {
        document.getElementById('start-btn').style.display = 'none';
        stat.innerText = "Calibra pasos 1 y 2";
    }).catch(e => alert("Error de cámara: " + e));
}
</script>
</body>
</html>
